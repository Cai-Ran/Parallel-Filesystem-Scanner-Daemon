[daemon]
user_download_sec = 60

[httpserver]
server_port = 8080
frontend_path = ./web/index_gemini.html
fd_queue_max_size = 8       
fd_pool_num_threads = 8

[scheduler]
max_concurrent_scan = 3
queue_max_size = 4

[manager]
scan_queue_max_size = 1000
scan_pool_num_threads = 4

[asynclogger]
log_dir = /mnt/c/Users/user/Desktop/PROJECT-mini/log/
queue_max_size = 8192

