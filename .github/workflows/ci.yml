name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake make

      - name: Install toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build service
        run: make LOG_DIR=./log OUT_DIR=./test_output

      - name: Build unit tests
        run: |
          cmake -S tests -B build-tests -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-tests --target test_job_queue test_thread_pool -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Run unit tests
        run: |
          ./build-tests/test_job_queue
          ./build-tests/test_thread_pool
