name: Clang-Tidy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy and bear
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy bear g++ make

      - name: Build with compile database
        run: bear -- make LOG_DIR=./log OUT_DIR=./test_output

      - name: Run clang-tidy (correctness-focused)
        run: |
          mapfile -t src_files < <(find src -type f -name "*.cpp")
          if [ "${#src_files[@]}" -eq 0 ]; then
            echo "No source files found."
            exit 0
          fi
          clang-tidy -p . "${src_files[@]}"
