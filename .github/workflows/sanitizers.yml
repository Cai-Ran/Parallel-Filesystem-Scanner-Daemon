name: Sanitizers

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  asan-tsan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ cmake make util-linux

      - name: Build sanitizer test targets
        run: |
          cmake -S tests -B build-tests -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-tests --target \
            test_job_queue_asan test_thread_pool_asan \
            test_job_queue_tsan test_thread_pool_tsan -j"$(nproc)"

      - name: Run ASAN tests
        run: |
          ASAN_OPTIONS=detect_leaks=1 ./build-tests/test_job_queue_asan
          ASAN_OPTIONS=detect_leaks=1 ./build-tests/test_thread_pool_asan

      - name: Run TSAN tests
        run: |
          if command -v setarch >/dev/null 2>&1; then
            setarch "$(uname -m)" -R env TSAN_OPTIONS=halt_on_error=1 ./build-tests/test_job_queue_tsan
            setarch "$(uname -m)" -R env TSAN_OPTIONS=halt_on_error=1 ./build-tests/test_thread_pool_tsan
          else
            TSAN_OPTIONS=halt_on_error=1 ./build-tests/test_job_queue_tsan
            TSAN_OPTIONS=halt_on_error=1 ./build-tests/test_thread_pool_tsan
          fi
